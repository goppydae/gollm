version: v2
modules:
  - path: proto
  - path: extensions/proto
lint:
  use:
    - STANDARD
  ignore_only:
    # extensions/proto: package name "proto" predates buf adoption; renaming
    # would require regenerating all extension binaries — deferred to a
    # dedicated proto migration PR.
    PACKAGE_DIRECTORY_MATCH:
      - extensions/proto/extension.proto
    PACKAGE_VERSION_SUFFIX:
      - extensions/proto/extension.proto
    SERVICE_SUFFIX:
      - extensions/proto/extension.proto
    RPC_REQUEST_RESPONSE_UNIQUE:
      - extensions/proto/extension.proto
      - proto/gollm/v1/agent.proto
    RPC_REQUEST_STANDARD_NAME:
      - extensions/proto/extension.proto
    # proto/gollm/v1/agent.proto: shared response types and enum naming are
    # established API surface; renaming would be a breaking change.
    RPC_RESPONSE_STANDARD_NAME:
      - proto/gollm/v1/agent.proto
    ENUM_VALUE_PREFIX:
      - proto/gollm/v1/agent.proto
    ENUM_ZERO_VALUE_SUFFIX:
      - proto/gollm/v1/agent.proto
breaking:
  use:
    - FILE
